<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nachtschall Map - Lobby</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
        }

        .lobby-container {
            background: linear-gradient(145deg, #2a2a3e, #1f1f2f);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 48px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6),
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 40px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            background: rgba(0, 0, 0, 0.2);
            padding: 6px;
            border-radius: 8px;
        }

        .tab-button {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #aaa;
            cursor: pointer;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .tab-button.active {
            background: linear-gradient(145deg, #3a5a7a, #2a4560);
            color: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .tab-button:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
            color: #ddd;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #aaa;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 15px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            outline: none;
            transition: all 0.2s;
        }

        input[type="text"]:focus,
        select:focus {
            border-color: rgba(100, 150, 255, 0.5);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 3px rgba(100, 150, 255, 0.1);
        }

        input[type="text"]::placeholder {
            color: #666;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(145deg, #667eea, #764ba2);
            color: #fff;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(145deg, #3a5a7a, #2a4560);
            color: #fff;
            box-shadow: 0 4px 12px rgba(42, 69, 96, 0.4);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(42, 69, 96, 0.5);
        }

        .map-preview {
            max-width: 100%;
            max-height: 180px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
            object-fit: cover;
            margin-top: 12px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            color: #ccc;
            font-size: 13px;
        }

        .checkbox-group input[type="checkbox"] {
            cursor: pointer;
        }

        .divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
            color: #666;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .upload-label {
            display: inline-block;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 600;
        }

        .upload-label:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        #error-message {
            display: none;
            padding: 12px;
            background: rgba(255, 100, 100, 0.1);
            border: 1px solid rgba(255, 100, 100, 0.3);
            border-radius: 8px;
            color: #ff6b6b;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="lobby-container">
        <h1>Nachtschall Map</h1>
        <p class="subtitle">Interactive fog-of-war map for tabletop RPGs</p>

        <div id="error-message"></div>

        <div class="tabs">
            <button class="tab-button active" data-tab="join">Join Room</button>
            <button class="tab-button" data-tab="create">Create Room</button>
        </div>

        <!-- Join Room Tab -->
        <div class="tab-content active" id="join-tab">
            <div class="form-group">
                <label for="join-room-id">Room Code</label>
                <input type="text" id="join-room-id" placeholder="Enter room code (e.g. ABC123)" maxlength="6">
            </div>
            <button class="btn btn-primary" id="join-btn">Join Room</button>
        </div>

        <!-- Create Room Tab -->
        <div class="tab-content" id="create-tab">
            <div class="form-group">
                <label for="map-select">Choose Map</label>
                <select id="map-select">
                    <option value="">-- Select a map --</option>
                </select>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="show-preview-checkbox">
                <label for="show-preview-checkbox" style="text-transform: none; font-weight: normal; margin: 0; cursor: pointer;">Show preview</label>
            </div>

            <img id="map-preview" class="map-preview" alt="Map preview">

            <div class="divider">OR</div>

            <div style="text-align: center;">
                <label for="map-file-input" class="upload-label">Upload Custom Map</label>
                <input type="file" id="map-file-input" accept="image/*" style="display: none;">
            </div>

            <button class="btn btn-secondary" id="create-btn" style="margin-top: 24px;">Create Room</button>
        </div>

        <div class="footer">
            Built with D3.js, Socket.IO, and Redis
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/lobby.js"></script>
</body>
</html>
