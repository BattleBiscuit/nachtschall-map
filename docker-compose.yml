services:
  nachtschall-map:
    build: .
    image: nachtschall-map:latest
    restart: unless-stopped
    networks:
      - proxy
      - internal
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    volumes:
      - map-uploads:/usr/src/app/public/uploads/maps
    depends_on:
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nachtschall-map.rule=Host(`nachtschall-map.seidel.life`)"
      - "traefik.http.routers.nachtschall-map.entrypoints=websecure"
      - "traefik.http.routers.nachtschall-map.tls.certresolver=le"
      - "traefik.http.services.nachtschall-map.loadbalancer.server.port=3000"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - redis-data:/data

networks:
  proxy:
    name: proxy
  internal:

volumes:
  redis-data:
  map-uploads:
