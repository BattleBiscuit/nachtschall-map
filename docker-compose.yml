version: '3.8'

services:
  nachtschall-map:
    build: .
    image: nachtschall-map:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - proxy
      - internal
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nachtschall.rule=Host(`nachtschall-map.seidel.life`)"
      - "traefik.http.routers.nachtschall.entrypoints=web"
      - "traefik.http.services.nachtschall.loadbalancer.server.port=3000"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - redis-data:/data

networks:
  proxy:
    name: proxy
  internal:

volumes:
  redis-data:
